    function saveState() {
      localStorage.setItem('profile', JSON.stringify(state.profile));

      localStorage.setItem('chats', JSON.stringify(state.chats));

    // --- NAVIGATION ROUTER ---
    function navigateTo(view, params = {}) {
      const pageWrapper = document.getElementById('page-content');
      
      // Close open widgets
      document.getElementById('notifications-dropdown').classList.add('hidden');
      
      pageWrapper.classList.remove('animate-fadeInUp');
      pageWrapper.classList.add('animate-fadeOutDown');

      setTimeout(() => {
        state.currentView = view;
        if (params.itemId) {
          state.selectedItem = state.listings.find(x => x.id === params.itemId);
        }
        
        renderView();
        updateNavHighlight();

        pageWrapper.classList.remove('animate-fadeOutDown');
        pageWrapper.classList.add('animate-fadeInUp');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 150);
    }

    function updateNavHighlight() {
      const views = ['home', 'catalog', 'messages', 'profile'];
      views.forEach(v => {
        const btn = document.getElementById(`nav-btn-${v}`);
        if (btn) {
          if (state.currentView === v || (v === 'profile' && state.currentView === 'all_lots')) {
            btn.classList.remove('text-brand-textMuted');
            btn.classList.add('text-white', 'bg-white/5', 'active-nav-glow');
          } else {
            btn.classList.remove('text-white', 'bg-white/5', 'active-nav-glow');
            btn.classList.add('text-brand-textMuted');
          }
        }
      });

      // Notification badge counter
      const unreadCount = state.notifications.filter(x => !x.read).length;
      const badge = document.getElementById('notif-badge');
      if (badge) {
        if (unreadCount > 0) badge.classList.remove('hidden');
        else badge.classList.add('hidden');
      }

      // Header profile avatar border
      const avatarBtn = document.getElementById('header-profile-avatar');
      if (avatarBtn) {
        if (state.currentView === 'profile') avatarBtn.classList.add('border-brand-red', 'shadow-glow-red');
        else avatarBtn.classList.remove('border-brand-red', 'shadow-glow-red');
      }
    }

    // --- SEARCH ---
    function handleSearch(q) {
      state.searchQuery = q.trim().toLowerCase();
      if (state.currentView !== 'catalog') navigateTo('catalog');
      else renderCatalogContent();
    }

    // --- VIEW RENDERER ---
    function renderView() {
      const pageWrapper = document.getElementById('page-content');
      
      switch(state.currentView) {
        case 'home':
          pageWrapper.innerHTML = getHomeHTML();
          break;
        case 'catalog':
          pageWrapper.innerHTML = getCatalogHTML();
          renderCatalogContent();
          break;
        case 'messages':
          pageWrapper.innerHTML = getMessagesHTML();
          scrollToChatBottom();
          break;
        case 'profile':
          pageWrapper.innerHTML = getProfileHTML();
          break;
        case 'all_lots':
          pageWrapper.innerHTML = getAllLotsHTML();
          break;
        case 'item_detail':
          pageWrapper.innerHTML = getItemDetailHTML();
          break;
      }
    }

    // --- INTERACTIVE ACTIONS ---
    function toggleFavorite(itemId, e) {
      if (e) e.stopPropagation();
      const index = state.favorites.indexOf(itemId);
      if (index === -1) {
        state.favorites.push(itemId);
        // Add to notifications
        const item = state.listings.find(x => x.id === itemId);
        addNotification(`Лот "${item.title}" добавлен в избранное.`);
      } else {
        state.favorites.splice(index, 1);
      }
      saveState();
      renderView();
    }

    function deleteListing(itemId, e) {
      if (e) e.stopPropagation();
      if (!confirm('Вы действительно хотите удалить этот лот?')) return;
      state.listings = state.listings.filter(x => x.id !== itemId);
      saveState();
      renderView();
      alert('Лот успешно удален.');
    }

    function toggleNotifications() {
      const dropdown = document.getElementById('notifications-dropdown');
      const isHidden = dropdown.classList.contains('hidden');
      if (isHidden) {
        // Mark all as read
        state.notifications.forEach(n => n.read = true);
        saveState();
        updateNavHighlight();
        
        // Render
        const list = document.getElementById('notifications-list');
        if (state.notifications.length === 0) {
          list.innerHTML = `<p class="text-center text-[10px] text-brand-textMuted py-4">Нет новых уведомлений</p>`;
        } else {
          list.innerHTML = state.notifications.map(n => `
            <div class="bg-white/5 border border-white/5 rounded-xl p-3 text-xs leading-relaxed space-y-1">
              <p class="text-white">${n.text}</p>
              <span class="text-[9px] text-brand-textMuted block">${n.date}</span>
            </div>
          `).join('');
        }
        dropdown.classList.remove('hidden');
      } else {
        dropdown.classList.add('hidden');
      }
    }

    function clearNotifications() {
      state.notifications = [];
      saveState();
      toggleNotifications(); // close and refresh
    }

    function addNotification(text) {
      state.notifications.unshift({ id: Date.now(), text, date: 'Только что', read: false });
      saveState();
      updateNavHighlight();
    }

    // --- FORM HANDLERS ---
    function handleAddListing(event) {
      event.preventDefault();
      const form = event.target;
      const newListing = {
        id: Date.now(),
        category: form.category.value,
        title: form.title.value,
        description: form.description.value,
        price: parseFloat(form.price.value),
        status: 'В наличии',
        tag: 'НОВИНКА',
        img: getGameImagePlaceholder(form.category.value)
      };

      state.listings.unshift(newListing);
      saveState();
      document.getElementById('add-listing-modal').classList.add('hidden');
      addNotification(`Вы выставили на продажу новый лот: "${newListing.title}"`);
      navigateTo('profile');
      alert('Объявление успешно опубликовано!');
    }

    function handleEditProfile(event) {
      event.preventDefault();
      const form = event.target;
      state.profile.name = form.name.value;
      state.profile.description = form.description.value;
      saveState();
      
      const headerAvatar = document.querySelector('#header-profile-avatar img');
      if (headerAvatar) headerAvatar.src = state.profile.avatar;

      document.getElementById('edit-profile-modal').classList.add('hidden');
      addNotification('Данные вашего профиля обновлены.');
      navigateTo('profile');
      alert('Профиль успешно обновлен!');
    }

    function handleSendMessage(event) {
      event.preventDefault();
      const input = document.getElementById('message-input-box');
      const text = input.value.trim();
      if (!text) return;

      const chat = state.chats.find(x => x.id === state.activeChatId);
      if (chat) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        chat.messages.push({ sender: 'sender', text, time });
        input.value = '';
        saveState();
        renderView();
        
        setTimeout(() => {
          chat.messages.push({
            sender: 'receiver',
            text: 'Спасибо за сообщение! Я отвечу вам в ближайшее время.',
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          });
          saveState();
          if (state.currentView === 'messages') renderView();
        }, 1200);
      }
    }

    function showReviewModal() {
      setReviewStars(5);
      document.getElementById('review-comment-box').value = '';
      document.getElementById('review-submission-modal').classList.remove('hidden');
    }

    function setReviewStars(stars) {
      state.selectedStars = stars;
      const btns = document.querySelectorAll('.star-btn');
      btns.forEach((btn, idx) => {
        if (idx < stars) {
          btn.className = 'star-btn text-2xl text-amber-500 transition-colors';
        } else {
          btn.className = 'star-btn text-2xl text-brand-textMuted transition-colors';
        }
      });
    }

    function submitReview() {
      const comment = document.getElementById('review-comment-box').value.trim() || 'Отличный товар, всё быстро выдано!';
      const newReview = {
        id: Date.now(),
        user: 'Ваш Профиль',
        stars: state.selectedStars,
        text: comment,
        date: 'Только что'
      };
      
      state.reviews.unshift(newReview);
      state.profile.reviewsCount += 1;
      
      // Calculate rating average
      const totalStars = state.reviews.reduce((acc, r) => acc + r.stars, 0);
      state.profile.rating = (totalStars / state.reviews.length).toFixed(1);
      
      saveState();
      document.getElementById('review-submission-modal').classList.add('hidden');
      alert('Отзыв отправлен! Рейтинг продавца обновлен.');
      navigateTo('profile');
    }

    function showPurchaseModal() {
      document.getElementById('purchase-modal').classList.remove('hidden');
    }

    function closePurchaseModal() {
      document.getElementById('purchase-modal').classList.add('hidden');
    }

    function renderCatalogContent() {
      const btns = document.querySelectorAll('.catalog-tab-btn');
      btns.forEach(btn => {
        const text = btn.innerText.trim();
        const isAll = state.catalogFilter === 'all' && text === 'Все игры';
        const isFav = state.catalogFilter === 'Favorites' && text === '♥ Избранное';
        const isGame = text === state.catalogFilter;
        if (isAll || isFav || isGame) {
          btn.className = 'catalog-tab-btn py-2 px-4 rounded-xl text-xs font-bold transition-all duration-300 border bg-brand-red text-white border-brand-red shadow-glow-red';
        } else {
          btn.className = 'catalog-tab-btn py-2 px-4 rounded-xl text-xs font-bold transition-all duration-300 border bg-brand-card text-brand-textMuted border-brand-border hover:text-white';
        }
      });

      const container = document.getElementById('catalog-results');
      if (!container) return;

      let items = state.listings;
      
      // Filter by category or favorites
      if (state.catalogFilter === 'Favorites') {
        items = items.filter(x => state.favorites.includes(x.id));
      } else if (state.catalogFilter !== 'all') {
        items = items.filter(x => x.category === state.catalogFilter);
      }

      // Filter by search
      if (state.searchQuery) {
        items = items.filter(x => 
          x.title.toLowerCase().includes(state.searchQuery) ||
          x.description.toLowerCase().includes(state.searchQuery) ||
          x.category.toLowerCase().includes(state.searchQuery)
        );
      }

      if (items.length === 0) {
        container.className = "flex flex-col items-center justify-center py-16 gap-3 text-center col-span-full";
        container.innerHTML = `
          <i class="fa-solid fa-magnifying-glass text-brand-textMuted text-4xl mb-2 animate-pulse"></i>
          <h3 class="text-white font-bold text-base">Объявления не найдены</h3>
          <p class="text-xs text-brand-textMuted max-w-xs">Попробуйте изменить поисковый запрос или выбрать другую категорию.</p>
        `;
        return;
      }

      container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6";
      container.innerHTML = items.map(item => {
        const isFav = state.favorites.includes(item.id);
        return `
          <div onclick="navigateTo('item_detail', {itemId: ${item.id}})" class="bg-brand-card rounded-2xl overflow-hidden border border-brand-border hover:border-brand-textMuted/30 hover:shadow-glass hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col h-full relative">

              </button>
            </div>
            <div class="p-5 flex-1 flex flex-col justify-between">

                <h3 class="font-medium text-sm mb-1 text-white group-hover:text-brand-red transition-colors line-clamp-1">${item.title}</h3>
                <p class="text-xs text-brand-textMuted mb-4 line-clamp-2">${item.description}</p>

    window.selectChat = selectChat;

    window.handleFileAttach = handleFileAttach;
    window.showPurchaseModal = showPurchaseModal;

    window.handlePurchase = handlePurchase;
    window.showReviewModal = showReviewModal;
